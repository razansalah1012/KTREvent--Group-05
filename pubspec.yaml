name: razakevent
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_messaging: ^16.2.0
  google_fonts: ^6.2.0
  file_picker: ^8.0.0+1
  url_launcher: ^6.3.2
  qr_flutter: ^4.1.0
  firebase_storage: ^13.4.2
  pdf: ^3.12.0
  path_provider: ^2.1.6
  csv: ^8.0.0
  share_plus: ^12.0.2
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.0
  fl_chart: ^1.2.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
    - assets/reports/

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
